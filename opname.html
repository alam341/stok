<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Opname — StokKu</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar"></div>
  <div class="main">
    <div class="page-header">
      <div><div class="page-title">Stock Opname</div><div class="page-subtitle">Sesuaikan stok aktual dengan kondisi fisik gudang</div></div>
    </div>
    <div class="alert alert-warning" style="max-width:900px;margin-bottom:16px">
      ⚠️ Isi kolom <strong>Stok Aktual</strong> hanya untuk produk yang perlu disesuaikan. Biarkan kosong jika stok sudah benar.
    </div>
    <div id="alert"></div>
    <div class="card" style="max-width:900px;margin-bottom:12px">
      <div class="card-body" style="padding:12px 16px">
        <input class="form-input" style="max-width:280px" placeholder="🔍 Cari produk..." oninput="filterTable(this.value)" id="search">
      </div>
    </div>
    <div class="card" style="max-width:900px">
      <div class="table-wrap">
        <table>
          <thead><tr><th>Produk</th><th style="text-align:right">Stok Sistem</th><th style="text-align:center">Stok Aktual</th><th style="text-align:center">Selisih</th><th>Catatan</th></tr></thead>
          <tbody id="tbody"><tr><td colspan="5"><div class="loading"><div class="spinner"></div></div></td></tr></tbody>
        </table>
      </div>
      <div style="padding:14px 16px;border-top:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center">
        <span id="change-count" style="font-size:13px;color:#64748b">Belum ada perubahan</span>
        <button class="btn btn-primary" style="background:#0d9488" onclick="saveOpname()" id="btn-save">Simpan Penyesuaian</button>
      </div>
    </div>
  </div>
</div>
<script src="config.js"></script>
<script src="sidebar.js"></script>
<script>
let products = [];

async function loadProducts() {
  const { data } = await db.from('products').select('*').eq('is_active',true).order('name');
  products = data||[];
  renderTable(products);
}

function renderTable(list) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = list.map(p=>`
    <tr id="tr-${p.id}">
      <td><div style="font-weight:500">${p.name}</div><div style="font-size:11.5px;color:#94a3b8">${p.sku} · ${p.unit}</div></td>
      <td style="text-align:right;font-weight:600">${formatNumber(p.current_stock)}</td>
      <td style="text-align:center">
        <input type="number" min="0" style="width:90px;text-align:center" class="form-input" id="act-${p.id}" placeholder="${p.current_stock}" oninput="updateDiff('${p.id}',${p.current_stock})">
      </td>
      <td style="text-align:center" id="diff-${p.id}">-</td>
      <td><input class="form-input" id="note-${p.id}" placeholder="alasan..." style="font-size:12px"></td>
    </tr>`).join('');
}

function filterTable(q) {
  const filtered = products.filter(p=>p.name.toLowerCase().includes(q.toLowerCase())||p.sku.toLowerCase().includes(q.toLowerCase()));
  renderTable(filtered);
}

function updateDiff(id, system) {
  const val = document.getElementById(`act-${id}`).value;
  const diffEl = document.getElementById(`diff-${id}`);
  const row = document.getElementById(`tr-${id}`);
  if (val===''||val===null) { diffEl.textContent='-'; diffEl.style.color=''; row.style.background=''; }
  else {
    const diff = Number(val)-system;
    diffEl.textContent = (diff>=0?'+':'')+formatNumber(diff);
    diffEl.style.color = diff>0?'#16a34a':diff<0?'#dc2626':'#64748b';
    row.style.background = diff!==0?'#fffbeb':'';
  }
  countChanges();
}

function countChanges() {
  const changed = products.filter(p=>{ const v=document.getElementById(`act-${p.id}`)?.value; return v!==''&&v!==null&&v!==undefined&&Number(v)!==p.current_stock; });
  const el = document.getElementById('change-count');
  el.textContent = changed.length>0?`${changed.length} produk akan disesuaikan`:'Belum ada perubahan';
  el.style.color = changed.length>0?'#d97706':'#64748b';
}

async function saveOpname() {
  const changed = products.filter(p=>{ const v=document.getElementById(`act-${p.id}`)?.value; return v!==''&&v!==null&&v!==undefined&&Number(v)!==p.current_stock; });
  if (!changed.length) { document.getElementById('alert').innerHTML='<div class="alert alert-error">Tidak ada perubahan</div>'; return; }
  const btn = document.getElementById('btn-save'); btn.disabled=true; btn.textContent='Menyimpan...';
  const today = new Date().toISOString().split('T')[0];
  for (const p of changed) {
    const actual = Number(document.getElementById(`act-${p.id}`).value);
    const diff = actual - p.current_stock;
    await db.from('products').update({current_stock:actual,updated_at:new Date().toISOString()}).eq('id',p.id);
    await db.from('stock_movements').insert({product_id:p.id,type:diff>0?'in_supplier':'out_packing',quantity:Math.abs(diff),stock_before:p.current_stock,stock_after:actual,transaction_date:today});
  }
  btn.disabled=false; btn.textContent='Simpan Penyesuaian';
  document.getElementById('alert').innerHTML=`<div class="alert alert-success">✓ ${changed.length} produk berhasil disesuaikan!</div>`;
  await loadProducts();
  setTimeout(()=>document.getElementById('alert').innerHTML='',3000);
}

async function init() {
  await requireAuth();
  initSidebar('opname');
  loadProducts();
}
init();
</script>
</body>
</html>
